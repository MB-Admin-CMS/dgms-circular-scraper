name: DGMS Circular Scraper Bot

on:
  schedule:
  # Har 1 ghante mein chalega
    - cron: '0 * * * *'
  workflow_dispatch: 

concurrency:
  group: scraper-group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Ab aapki requirements.txt file use hogi
        pip install -r requirements.txt

    - name: Run Scraper
      run: |
        python scraper.py

    - name: Commit and Push if changed
      run: |
        # Sirf circular.json ko stage karega
        git add circular.json
        
        # Agar changes hain, tabhi commit karega
        if ! git diff --staged --quiet; then
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update DGMS Circulars"
          git push origin HEAD
        fi
