name: DGMS Scraper Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

concurrency:
  group: scraper-group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run All Scrapers
      run: |
        python scraper.py
        python circular_scraper.py

    - name: Commit and Push if changed
      run: |
        # Dono files ko stage karo
        git add notification.json circular.json
        
        # Agar dono mein se kisi mein bhi changes hain, toh commit karega
        if ! git diff --staged --quiet; then
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update DGMS Notifications & Circulars"
          git push origin HEAD
        fi
